<div class="confirm-dialog">
    <h2 mat-dialog-title class="confirm-dialog__title">{{data.title}}</h2>
</div>

<div mat-dialog-content class="confirm-dialog__message">
    {{data.message}}
</div>

<div mat-dialog-actions [align]="'end'">
    <button mat-raised-button [mat-dialog-close]="false">{{data.cancelLabel}}</button>
    <button mat-raised-button color="primary" [mat-dialog-close]="true">{{data.confirmLabel}}</button>
</div>
