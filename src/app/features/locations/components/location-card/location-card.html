@let locationVariable = location();
<div class="location-card">
  <div class="location-card__wrapper">
    <h1 class="location-card__title">{{ locationVariable?.name }}</h1>

    <div class="location-card__actions">
      <mat-icon
        aria-hidden="false"
        aria-label="Example edit icon"
        class="location-card__edit-icon"
        fontIcon="edit"
        matTooltip="{{ TEXT.buttons.edit }}"
        matTooltipPosition="above"
        (click)="modalService.openModalEdit(locationVariable)"
      ></mat-icon>
      <mat-icon
        aria-hidden="false"
        aria-label="Example delete icon"
        class="location-card__delete-icon"
        fontIcon="delete"
        matTooltip="{{ TEXT.buttons.delete }}"
        matTooltipPosition="above"
        (click)="openDialog()"
      ></mat-icon>
    </div>
  </div>
  <p class="location-card__city">{{ locationVariable?.location }}</p>
</div>
